# Neuron HQ Runtime Limits

# Time limits
max_run_hours: 8  # Maximum hours for a single run
default_run_hours: 3  # Default if not specified
bash_timeout_seconds: 600  # 10 minutes per bash command
verification_timeout_seconds: 1800  # 30 minutes for full test suite

# Iteration limits
max_iterations_per_run: 50  # Maximum agent iterations before forced stop
max_iterations_manager: 230
max_iterations_implementer: 180
max_iterations_reviewer: 60
max_iterations_tester: 30
max_iterations_merger: 30
max_iterations_historian: 50
max_iterations_librarian: 70
max_iterations_researcher: 50
max_wip_features: 1  # Work in progress limit (focus on one thing at a time)
max_parallel_implementers: 3    # Max 3 simultaneous Implementers per wave
max_iterations_consolidator: 30
consolidation_frequency: 10  # Run consolidator every N completed runs

# Diff limits
diff_warn_lines: 150  # Warn if diff exceeds this
diff_block_lines: 300  # Block if diff exceeds this (require split). 500 for purely additive (new files only).

# Research limits
max_web_searches_per_run: 10  # Maximum web searches allowed
max_sources_per_research: 20  # Maximum sources in research/sources.md

# Question limits
max_blocker_questions: 3  # Maximum blockers in questions.md
max_ideas: 10  # Maximum ideas in ideas.md

# File size limits
max_file_size_bytes: 10485760  # 10MB max file size for processing
max_artifact_size_bytes: 5242880  # 5MB max artifact file size

# Audit limits
audit_log_max_entries: 10000  # Rotate audit.jsonl if exceeds
manifest_checksum_algorithm: "sha256"

# Retry/backoff
max_command_retries: 2
retry_backoff_seconds: 5

# Multi-provider: per-agent model overrides
agent_models:
  researcher:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  historian:
    provider: anthropic
    model: claude-haiku-4-5-20251001
  librarian:
    provider: anthropic
    model: claude-haiku-4-5-20251001

# Knowledge Manager auto-scheduling
km_auto:
  enabled: false
  min_runs_between: 3
  max_actions_per_run: 3
  skip_on_red: true
  topic_from_brief: true

# Knowledge Manager chaining (topic chaining)
km_chaining:
  enabled: true
  maxCycles: 3
  maxTimeMinutes: 15
  convergenceThreshold: 2    # stop if < 2 new gaps per cycle
  emergentGapsPerCycle: 5    # max new gaps extracted per cycle

# CrossRef DOI lookup configuration
crossref:
  enabled: true
  userAgent: "NeuronHQ/1.0"
  maxRequestsPerSecond: 1
  timeout: 10000
  minDisambiguationScore: 0.5
